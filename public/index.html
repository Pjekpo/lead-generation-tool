<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Generation Tool</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-bar">
          <div>
            <p class="eyebrow">Apify lead workflows</p>
            <h1>Lead Generation Tool</h1>
            <p>Run Google Maps lead searches with Apify scraper inputs.</p>
          </div>
        </div>
      </header>

      <div id="appSections" class="workspace">
        <section class="panel controls-panel">
          <form id="leadForm" class="form" novalidate>
            <div class="form-section">
              <label class="field search-term-field">
                <span>Search term(s)</span>
                <div class="search-term-box">
                  <div id="searchTermRows" class="search-term-rows"></div>
                  <div class="search-term-actions">
                    <button id="addSearchTermBtn" type="button" class="add-btn">+ Add</button>
                    <button id="bulkEditBtn" type="button" class="secondary-btn compact-btn">Bulk edit</button>
                    <button id="removeEmptyBtn" type="button" class="secondary-btn compact-btn remove-empty-btn" disabled>
                      Remove empty fields
                    </button>
                  </div>
                </div>
              </label>

              <label class="field">
                <span>Location (use only one location per run)</span>
                <input id="location" name="location" type="text" value="New York, USA" placeholder="New York, USA" />
              </label>

              <label class="field places-field">
                <span>Number of places to extract (per each search term or URL)</span>
                <input id="placesPerSearch" name="placesPerSearch" type="number" min="1" max="500" value="50" required />
              </label>
            </div>

            <button id="submitBtn" type="submit">Generate Leads</button>
          </form>
        </section>

        <section class="panel results-panel">
          <div class="results-header">
            <div>
              <h2>Results</h2>
              <p id="status" class="status">Waiting for request.</p>
            </div>
          </div>
          <div class="table-wrap">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>Company Name</th>
                  <th>Phone Number</th>
                  <th>Type</th>
                  <th>Address</th>
                  <th>Needs Website</th>
                  <th>Website</th>
                  <th>Google Maps URL</th>
                  <th>Qualification Score</th>
                  <th>Qualified</th>
                </tr>
              </thead>
              <tbody id="resultsBody">
                <tr>
                  <td colspan="9" class="placeholder">No leads yet.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
